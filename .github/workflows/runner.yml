name: Health Check Runner

concurrency:
  group: health-check-runner
  cancel-in-progress: false

on:
  schedule:
    - cron: "*/30 * * * *"
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  health-check-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run Shell Script
        run: bash .github/scripts/health-check.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Wait 5 minutes
        run: sleep 300

      # - name: Debug github variables as JSON
      #   run: echo '${{ toJson(github) }}'

      - name: Trigger next run
        if: success() && github.run_attempt == 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/runner.yml/dispatches \
            -d "{\"ref\":\"${{ github.ref_name }}\"}"
